<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" role="img" aria-label="Web and Shopify development — storefront product page mock">
  <defs>
    <linearGradient id="webProd" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#cceecc"/>
      <stop offset="1" stop-color="#7bbf7e"/>
    </linearGradient>
    <linearGradient id="webBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7f8f7"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="webShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="400" height="200" fill="url(#webBg)"/>

  <g filter="url(#webShadow)">
    <rect x="20" y="20" width="360" height="160" rx="12" fill="#ffffff" stroke="#e7e7e7"/>
    <!-- chrome -->
    <rect x="20" y="20" width="360" height="22" rx="12" fill="#f7f8f7"/>
    <rect x="20" y="36" width="360" height="6" fill="#f7f8f7"/>
    <line x1="20" y1="42" x2="380" y2="42" stroke="#e7e7e7"/>
    <circle cx="32" cy="31" r="2.5" fill="#e0e0e0"/>
    <circle cx="42" cy="31" r="2.5" fill="#e0e0e0"/>
    <circle cx="52" cy="31" r="2.5" fill="#388E3C"/>
    <rect x="138" y="25" width="124" height="12" rx="6" fill="#ffffff" stroke="#e7e7e7"/>
    <text x="200" y="34" text-anchor="middle" font-family="Inter, sans-serif" font-size="7" fill="#5b5b5b">your-store.com/products/...</text>

    <!-- product image left -->
    <rect x="36" y="58" width="120" height="106" rx="10" fill="url(#webProd)"/>
    <path d="M 60,138 C 60,118 70,112 84,112 L 110,112 C 124,112 134,120 142,130 C 148,138 148,142 144,148 L 60,148 C 56,146 56,140 60,138 Z" fill="#1f5022" opacity="0.55"/>
    <ellipse cx="76" cy="130" rx="6" ry="9" fill="#1f5022" opacity="0.7"/>

    <!-- product info right -->
    <text x="174" y="74" font-family="Inter, sans-serif" font-size="7" font-weight="700" fill="#388E3C" letter-spacing="0.6">NEW · BESTSELLER</text>
    <text x="174" y="92" font-family="Poppins, sans-serif" font-size="13" font-weight="600" fill="#181818" letter-spacing="-0.4">Trail Runner Pro</text>
    <text x="174" y="108" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#181818">$148.00</text>
    <text x="362" y="108" text-anchor="end" font-family="Inter, sans-serif" font-size="8" fill="#5b5b5b">★ 4.8</text>

    <!-- size pills -->
    <rect x="174" y="118" width="22" height="16" rx="8" fill="#ffffff" stroke="#e7e7e7"/>
    <text x="185" y="129" text-anchor="middle" font-family="Inter, sans-serif" font-size="7" fill="#5b5b5b">8</text>
    <rect x="200" y="118" width="22" height="16" rx="8" fill="#181818"/>
    <text x="211" y="129" text-anchor="middle" font-family="Inter, sans-serif" font-size="7" font-weight="700" fill="#fff">9</text>
    <rect x="226" y="118" width="22" height="16" rx="8" fill="#ffffff" stroke="#e7e7e7"/>
    <text x="237" y="129" text-anchor="middle" font-family="Inter, sans-serif" font-size="7" fill="#5b5b5b">10</text>

    <!-- ATC -->
    <rect x="174" y="142" width="190" height="22" rx="11" fill="#388E3C"/>
    <text x="269" y="156" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#ffffff">Add to bag</text>
  </g>
</svg>
