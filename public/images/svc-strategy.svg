<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" role="img" aria-label="eCommerce strategy — quarterly roadmap with marketing, site, and operations swim lanes">
  <defs>
    <linearGradient id="strBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7f8f7"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="strShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="400" height="200" fill="url(#strBg)"/>

  <g filter="url(#strShadow)">
    <rect x="20" y="22" width="360" height="156" rx="12" fill="#ffffff" stroke="#e7e7e7"/>

    <!-- Header -->
    <text x="34" y="42" font-family="Inter, sans-serif" font-size="8" font-weight="700" fill="#5b5b5b" letter-spacing="0.7">2026 ROADMAP · YOUR BRAND</text>
    <rect x="280" y="30" width="86" height="18" rx="9" fill="#cceecc"/>
    <text x="323" y="42" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" font-weight="800" fill="#1f5022">SHIPPED 14/22</text>

    <!-- Quarter columns header -->
    <text x="116" y="64" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" font-weight="700" fill="#181818" letter-spacing="0.5">Q1</text>
    <text x="184" y="64" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" font-weight="700" fill="#181818" letter-spacing="0.5">Q2</text>
    <text x="252" y="64" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" font-weight="700" fill="#181818" letter-spacing="0.5">Q3</text>
    <text x="320" y="64" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" font-weight="700" fill="#181818" letter-spacing="0.5">Q4</text>
    <line x1="84" y1="68" x2="358" y2="68" stroke="#e7e7e7"/>

    <!-- Lane 1: Marketing -->
    <text x="34" y="92" font-family="Inter, sans-serif" font-size="8" font-weight="600" fill="#5b5b5b">Marketing</text>
    <rect x="84" y="80" width="136" height="20" rx="10" fill="#cceecc"/>
    <text x="92" y="93" font-family="Inter, sans-serif" font-size="8" font-weight="700" fill="#1f5022">Spring · creative refresh</text>
    <rect x="226" y="80" width="80" height="20" rx="10" fill="#388E3C"/>
    <text x="234" y="93" font-family="Inter, sans-serif" font-size="8" font-weight="700" fill="#fff">Loyalty launch</text>
    <rect x="312" y="80" width="44" height="20" rx="10" fill="#e7e7e7"/>

    <!-- Lane 2: Site -->
    <text x="34" y="120" font-family="Inter, sans-serif" font-size="8" font-weight="600" fill="#5b5b5b">Site</text>
    <rect x="84" y="108" width="80" height="20" rx="10" fill="#181818"/>
    <text x="92" y="121" font-family="Inter, sans-serif" font-size="8" font-weight="700" fill="#cceecc">Theme rebuild</text>
    <rect x="170" y="108" width="118" height="20" rx="10" fill="#cceecc"/>
    <text x="178" y="121" font-family="Inter, sans-serif" font-size="8" font-weight="700" fill="#1f5022">PDP A/B program</text>
    <rect x="294" y="108" width="62" height="20" rx="10" fill="#e7e7e7"/>

    <!-- Lane 3: Ops -->
    <text x="34" y="148" font-family="Inter, sans-serif" font-size="8" font-weight="600" fill="#5b5b5b">Ops</text>
    <rect x="84" y="136" width="46" height="20" rx="10" fill="#cceecc"/>
    <rect x="136" y="136" width="116" height="20" rx="10" fill="#388E3C"/>
    <text x="144" y="149" font-family="Inter, sans-serif" font-size="8" font-weight="700" fill="#fff">Allocation rework</text>
    <rect x="258" y="136" width="98" height="20" rx="10" fill="#cceecc"/>
    <text x="266" y="149" font-family="Inter, sans-serif" font-size="8" font-weight="700" fill="#1f5022">Replenishment AI</text>

    <!-- Today marker -->
    <line x1="216" y1="72" x2="216" y2="160" stroke="#388E3C" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.7"/>
    <circle cx="216" cy="72" r="3.5" fill="#388E3C"/>
    <text x="216" y="172" text-anchor="middle" font-family="Inter, sans-serif" font-size="7" font-weight="700" fill="#388E3C" letter-spacing="0.5">TODAY</text>
  </g>
</svg>
