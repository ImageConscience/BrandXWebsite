<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" role="img" aria-label="CRO and BI — analytics dashboard fragment with revenue trend, KPI tiles, and live A/B test winner">
  <defs>
    <linearGradient id="croBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7f8f7"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="croChart" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#388E3C" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#388E3C" stop-opacity="0"/>
    </linearGradient>
    <filter id="croShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="400" height="200" fill="url(#croBg)"/>

  <!-- Main revenue card -->
  <g filter="url(#croShadow)">
    <rect x="20" y="22" width="220" height="100" rx="12" fill="#ffffff" stroke="#e7e7e7"/>
    <text x="34" y="42" font-family="Inter, sans-serif" font-size="8" font-weight="700" fill="#5b5b5b" letter-spacing="0.7">REVENUE · 30 DAYS</text>
    <text x="34" y="68" font-family="Poppins, sans-serif" font-size="22" font-weight="700" fill="#181818" letter-spacing="-1">$847,392</text>
    <rect x="148" y="50" width="56" height="20" rx="10" fill="#cceecc"/>
    <text x="176" y="64" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#1f5022">↑ 38.4%</text>
    <!-- mini chart -->
    <path d="M 34,108 C 50,104 64,98 84,94 S 124,82 144,76 S 184,62 222,52 L 222,114 L 34,114 Z" fill="url(#croChart)"/>
    <path d="M 34,108 C 50,104 64,98 84,94 S 124,82 144,76 S 184,62 222,52" fill="none" stroke="#388E3C" stroke-width="2" stroke-linecap="round"/>
    <circle cx="222" cy="52" r="3.5" fill="#fff" stroke="#388E3C" stroke-width="1.8"/>
  </g>

  <!-- KPI tiles row -->
  <g filter="url(#croShadow)">
    <rect x="20" y="132" width="106" height="48" rx="10" fill="#ffffff" stroke="#e7e7e7"/>
    <text x="32" y="148" font-family="Inter, sans-serif" font-size="7" font-weight="700" fill="#5b5b5b" letter-spacing="0.6">CONV RATE</text>
    <text x="32" y="166" font-family="Poppins, sans-serif" font-size="13" font-weight="700" fill="#181818" letter-spacing="-0.5">3.84%</text>
    <text x="32" y="178" font-family="Inter, sans-serif" font-size="7" fill="#388E3C" font-weight="600">+0.62 pts</text>

    <rect x="134" y="132" width="106" height="48" rx="10" fill="#ffffff" stroke="#e7e7e7"/>
    <text x="146" y="148" font-family="Inter, sans-serif" font-size="7" font-weight="700" fill="#5b5b5b" letter-spacing="0.6">CONTRIB MARGIN</text>
    <text x="146" y="166" font-family="Poppins, sans-serif" font-size="13" font-weight="700" fill="#181818" letter-spacing="-0.5">42.7%</text>
    <text x="146" y="178" font-family="Inter, sans-serif" font-size="7" fill="#388E3C" font-weight="600">+8.4 pts</text>
  </g>

  <!-- A/B Test winner card -->
  <g filter="url(#croShadow)" transform="translate(252, 22)">
    <rect x="0" y="0" width="128" height="158" rx="12" fill="#181818"/>
    <rect x="14" y="14" width="58" height="18" rx="9" fill="#cceecc"/>
    <text x="43" y="26" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" font-weight="800" fill="#1f5022">ABE CRO</text>
    <text x="14" y="50" font-family="Inter, sans-serif" font-size="7" font-weight="700" fill="#cceecc" letter-spacing="0.7">TEST 047 · WINNER</text>
    <text x="14" y="72" font-family="Poppins, sans-serif" font-size="13" font-weight="600" fill="#ffffff" letter-spacing="-0.3">Spring theme</text>
    <text x="14" y="86" font-family="Poppins, sans-serif" font-size="13" font-weight="600" fill="#ffffff" letter-spacing="-0.3">vs. control</text>
    <line x1="14" y1="98" x2="114" y2="98" stroke="rgba(255,255,255,0.14)"/>
    <text x="14" y="118" font-family="Inter, sans-serif" font-size="8" fill="rgba(255,255,255,0.7)">Confidence</text>
    <text x="114" y="118" text-anchor="end" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#fff">99%</text>
    <text x="14" y="134" font-family="Inter, sans-serif" font-size="8" fill="rgba(255,255,255,0.7)">Conv lift</text>
    <text x="114" y="134" text-anchor="end" font-family="Poppins, sans-serif" font-size="11" font-weight="700" fill="#7bdc7f">+18.2%</text>
    <rect x="14" y="142" width="100" height="8" rx="4" fill="rgba(255,255,255,0.12)"/>
    <rect x="14" y="142" width="82" height="8" rx="4" fill="#7bdc7f"/>
  </g>
</svg>
