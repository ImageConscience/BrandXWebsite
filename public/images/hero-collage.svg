<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 750" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="heroTitle">
  <title id="heroTitle">Brand X Commerce — every surface of an eCom business, run by one team</title>
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c1c1c"/>
      <stop offset="1" stop-color="#0b0b0b"/>
    </linearGradient>
    <radialGradient id="greenGlow" cx="0.5" cy="0.5">
      <stop offset="0" stop-color="#388E3C" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#388E3C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mintGlow" cx="0.5" cy="0.5">
      <stop offset="0" stop-color="#cceecc" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#cceecc" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="phoneScreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f7f8f7"/>
    </linearGradient>
    <linearGradient id="productBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#cceecc"/>
      <stop offset="1" stop-color="#7bbf7e"/>
    </linearGradient>
    <linearGradient id="chartFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#388E3C" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#388E3C" stop-opacity="0"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#ffffff" opacity="0.06"/>
    </pattern>
    <filter id="dropBig" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="dropMed" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
    <filter id="dropSm" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- Backdrop -->
  <rect width="600" height="750" rx="22" fill="url(#bgGrad)"/>
  <rect width="600" height="750" rx="22" fill="url(#dots)"/>
  <ellipse cx="500" cy="120" rx="340" ry="260" fill="url(#greenGlow)" opacity="0.55"/>
  <ellipse cx="80" cy="640" rx="280" ry="220" fill="url(#mintGlow)" opacity="0.55"/>
  <text x="305" y="540" text-anchor="middle" font-family="Poppins, sans-serif" font-size="640" font-weight="800" fill="#ffffff" opacity="0.028" letter-spacing="-30">X</text>

  <!-- Dashboard card (back-right) -->
  <g transform="translate(280, 96) rotate(4 145 100)" filter="url(#dropBig)">
    <rect x="0" y="0" width="290" height="200" rx="14" fill="#ffffff"/>
    <rect x="0" y="0" width="290" height="22" rx="14" fill="#f7f8f7"/>
    <rect x="0" y="14" width="290" height="8" fill="#f7f8f7"/>
    <line x1="0" y1="22" x2="290" y2="22" stroke="#e7e7e7"/>
    <circle cx="12" cy="11" r="2.5" fill="#e0e0e0"/>
    <circle cx="22" cy="11" r="2.5" fill="#e0e0e0"/>
    <circle cx="32" cy="11" r="2.5" fill="#e0e0e0"/>
    <text x="18" y="46" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#5b5b5b" letter-spacing="0.8">REVENUE · 30 DAYS</text>
    <text x="18" y="80" font-family="Poppins, sans-serif" font-size="32" font-weight="700" fill="#181818" letter-spacing="-1.5">$847,392</text>
    <rect x="186" y="58" width="78" height="24" rx="12" fill="#cceecc"/>
    <text x="225" y="74" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1f5022">↑ 38.4%</text>
    <path d="M 18,170 C 50,160 80,150 110,140 S 160,110 200,90 S 240,55 272,40 L 272,184 L 18,184 Z" fill="url(#chartFill)"/>
    <path d="M 18,170 C 50,160 80,150 110,140 S 160,110 200,90 S 240,55 272,40" fill="none" stroke="#388E3C" stroke-width="2.4" stroke-linecap="round"/>
    <circle cx="272" cy="40" r="5" fill="#fff" stroke="#388E3C" stroke-width="2"/>
  </g>

  <!-- Phone (front-left, dominant) -->
  <g transform="translate(36, 158) rotate(-5 120 225)" filter="url(#dropBig)">
    <rect x="0" y="0" width="240" height="450" rx="38" fill="#181818"/>
    <rect x="6" y="6" width="228" height="438" rx="34" fill="url(#phoneScreen)"/>
    <rect x="98" y="14" width="44" height="6" rx="3" fill="#181818"/>

    <text x="20" y="46" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#5b5b5b" letter-spacing="0.6">YOUR STORE</text>
    <circle cx="208" cy="42" r="9" fill="none" stroke="#181818" stroke-width="1.5"/>
    <line x1="214" y1="48" x2="220" y2="54" stroke="#181818" stroke-width="1.5" stroke-linecap="round"/>

    <rect x="20" y="58" width="200" height="220" rx="14" fill="url(#productBg)"/>
    <!-- stylized sneaker silhouette -->
    <path d="M 50,210 C 50,178 64,170 86,170 L 130,170 C 154,170 174,182 188,200 C 198,212 200,222 196,232 L 50,232 C 46,228 46,218 50,210 Z" fill="#1f5022" opacity="0.55"/>
    <ellipse cx="78" cy="200" rx="10" ry="14" fill="#1f5022" opacity="0.7"/>
    <ellipse cx="100" cy="195" rx="9" ry="13" fill="#1f5022" opacity="0.55"/>
    <line x1="64" y1="232" x2="194" y2="232" stroke="#0d3b10" stroke-width="3" stroke-linecap="round"/>
    <!-- swoosh accent -->
    <path d="M 90,220 C 110,206 140,200 170,210" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.7"/>

    <text x="20" y="306" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#388E3C" letter-spacing="0.9">NEW · BESTSELLER</text>
    <text x="20" y="330" font-family="Poppins, sans-serif" font-size="19" font-weight="600" fill="#181818" letter-spacing="-0.5">Trail Runner Pro</text>
    <text x="20" y="354" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#181818">$148.00</text>
    <text x="220" y="354" text-anchor="end" font-family="Inter, sans-serif" font-size="11" fill="#5b5b5b">★ 4.8 (1,284)</text>
    <rect x="20" y="378" width="200" height="44" rx="22" fill="#388E3C"/>
    <text x="120" y="406" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Add to bag</text>
  </g>

  <!-- ShopGap AI card (top-left) -->
  <g transform="translate(28, 76) rotate(-4 100 31)" filter="url(#dropMed)">
    <rect x="0" y="0" width="208" height="64" rx="14" fill="#ffffff"/>
    <rect x="12" y="14" width="36" height="36" rx="9" fill="#181818"/>
    <text x="30" y="38" text-anchor="middle" font-family="Poppins, sans-serif" font-size="14" font-weight="800" fill="#cceecc">AI</text>
    <text x="58" y="26" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#388E3C" letter-spacing="0.7">SHOPGAP · CITED BY</text>
    <text x="58" y="46" font-family="Poppins, sans-serif" font-size="13" font-weight="600" fill="#181818" letter-spacing="-0.3">ChatGPT &amp; Perplexity</text>
  </g>

  <!-- A/B Winner pill (top-right) -->
  <g transform="translate(322, 50) rotate(8 88 28)" filter="url(#dropMed)">
    <rect x="0" y="0" width="176" height="56" rx="28" fill="#388E3C"/>
    <circle cx="22" cy="28" r="9" fill="#cceecc"/>
    <text x="22" y="32" text-anchor="middle" font-family="Poppins, sans-serif" font-size="11" font-weight="800" fill="#1f5022">A/B</text>
    <text x="40" y="22" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#cceecc" letter-spacing="0.7">ABE CRO · TEST 047</text>
    <text x="40" y="42" font-family="Poppins, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Winner shipped</text>
  </g>

  <!-- Loyalty card (mid-right, on top of dashboard) -->
  <g transform="translate(370, 318) rotate(6 105 52)" filter="url(#dropMed)">
    <rect x="0" y="0" width="210" height="104" rx="14" fill="#ffffff"/>
    <text x="16" y="24" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#388E3C" letter-spacing="0.8">LOYALEST · INSIDER TIER</text>
    <text x="16" y="54" font-family="Poppins, sans-serif" font-size="22" font-weight="700" fill="#181818" letter-spacing="-1">2,400 pts</text>
    <rect x="16" y="64" width="146" height="6" rx="3" fill="#f1f1f1"/>
    <rect x="16" y="64" width="98" height="6" rx="3" fill="#388E3C"/>
    <text x="16" y="88" font-family="Inter, sans-serif" font-size="10" fill="#5b5b5b">Next reward in 600 pts</text>
    <circle cx="186" cy="22" r="11" fill="#cceecc"/>
    <text x="186" y="27" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#1f5022">★</text>
  </g>

  <!-- Email mockup (bottom-right) -->
  <g transform="translate(326, 458) rotate(-3 110 80)" filter="url(#dropMed)">
    <rect x="0" y="0" width="222" height="160" rx="12" fill="#ffffff"/>
    <rect x="0" y="0" width="222" height="6" rx="3" fill="#388E3C"/>
    <text x="14" y="28" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#5b5b5b" letter-spacing="0.7">FROM YOUR STORE · KLAVIYO</text>
    <text x="14" y="50" font-family="Poppins, sans-serif" font-size="13" font-weight="600" fill="#181818" letter-spacing="-0.3">Your favorites are 20% off →</text>
    <rect x="14" y="62" width="194" height="62" rx="8" fill="#e8f6e6"/>
    <rect x="22" y="70" width="46" height="46" rx="7" fill="#7bbf7e"/>
    <path d="M 32,100 C 32,90 38,86 46,86 L 56,86 C 62,86 66,92 66,98 L 32,98 Z" fill="#1f5022" opacity="0.5"/>
    <rect x="76" y="74" width="110" height="8" rx="4" fill="#1f5022" opacity="0.65"/>
    <rect x="76" y="88" width="80" height="6" rx="3" fill="#1f5022" opacity="0.35"/>
    <rect x="76" y="100" width="64" height="12" rx="6" fill="#388E3C"/>
    <text x="14" y="142" font-family="Inter, sans-serif" font-size="9" fill="#5b5b5b">Triggered 14h after browse · 38% open rate</text>
  </g>

  <!-- Slack team avatar pile (bottom-left) -->
  <g transform="translate(56, 588) rotate(-2 122 42)" filter="url(#dropMed)">
    <rect x="0" y="0" width="244" height="84" rx="16" fill="#ffffff"/>
    <g transform="translate(14, 22)">
      <circle cx="20" cy="20" r="20" fill="#7bbf7e"/>
      <text x="20" y="26" text-anchor="middle" font-family="Poppins, sans-serif" font-size="15" font-weight="700" fill="#fff">L</text>
      <circle cx="48" cy="20" r="20" fill="#cceecc"/>
      <text x="48" y="26" text-anchor="middle" font-family="Poppins, sans-serif" font-size="15" font-weight="700" fill="#1f5022">D</text>
      <circle cx="76" cy="20" r="20" fill="#388E3C"/>
      <text x="76" y="26" text-anchor="middle" font-family="Poppins, sans-serif" font-size="15" font-weight="700" fill="#fff">M</text>
      <circle cx="104" cy="20" r="20" fill="#181818"/>
      <text x="104" y="26" text-anchor="middle" font-family="Poppins, sans-serif" font-size="15" font-weight="700" fill="#cceecc">+4</text>
    </g>
    <text x="142" y="38" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#5b5b5b" letter-spacing="0.6">YOUR ECOM TEAM</text>
    <text x="142" y="60" font-family="Poppins, sans-serif" font-size="14" font-weight="600" fill="#181818" letter-spacing="-0.3">Live in your Slack</text>
  </g>
</svg>
